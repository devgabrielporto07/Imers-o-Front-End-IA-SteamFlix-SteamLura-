<!DOCTYPE html>
<html lang="pt-BR">      
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="SteamFlix - Escolha seu perfil de visualização">
    <title>SteamFlix</title>
     <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="top-header">
        <div class="header-left">
            <h1 class="logo">STEAMFLIX</h1>
        </div>
        <div class="header-center">
            <h2> Escolha seu perfil: </h2>
        </div>
        <div class="header-right">
            <button class="theme-toggle" id="themeToggle" title="Alternar tema">
                <svg class="sun-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="5"></circle>
                    <line x1="12" y1="1" x2="12" y2="3"></line>
                    <line x1="12" y1="21" x2="12" y2="23"></line>
                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                    <line x1="1" y1="12" x2="3" y2="12"></line>
                    <line x1="21" y1="12" x2="23" y2="12"></line>
                    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                </svg>
                <svg class="moon-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                </svg>
            </button>
        </div>
    </header>

    <main>
        <section class="perfis-container">
            <article class="perfil">
                <img src="Perfil1.png" alt="Perfil1">
                <h2>Pedro</h2>
            </article>

            <article class="perfil">
                <img src="Perfil2.png" alt="Perfil2">
                <h2>Ana</h2>
            </article>
        </section>
    </main>

    <footer>
        <!-- Informações do rodapé -->
    </footer>
    <script src="script.js"></script>
</body>
</html>
